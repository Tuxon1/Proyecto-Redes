<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Chivatazo - Ultimate Sport Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');

        :root {
            --bg: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            --glass: rgba(15, 23, 42, 0.8);
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --card: rgba(255, 255, 255, 0.05);
            --accent: #00d4ff;
        }

        .light-mode {
            --bg: radial-gradient(circle at top, #f8fafc 0%, #e2e8f0 100%);
            --glass: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
            --border: rgba(0, 0, 0, 0.1);
            --card: rgba(0, 0, 0, 0.05);
            --accent: #0284c7;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .glass-header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .match-card {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px;
            transition: 0.2s;
        }

        .match-card:hover {
            background: rgba(0, 212, 255, 0.05);
        }

        .is-liked { color: #ef4444 !important; transform: scale(1.1); }
        .text-cyan-glow { color: var(--accent); text-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }

        /* Estilos Pestañas Deportes */
        .tab-btn { transition: all 0.3s ease; border-bottom: 2px solid transparent; }
        .tab-active { border-bottom: 2px solid #00d4ff; color: #00d4ff; background: rgba(0, 212, 255, 0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #modalPost {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #1a1a2e;
            width: 100%;
            max-width: 700px;
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 30px;
            position: relative;
            color: white;
        }
    </style>
</head>

<body>

    <div id="modalPost" onclick="cerrarModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="cerrarModal()" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-white">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <aside class="hidden lg:flex flex-col w-64 p-6 sticky top-0 h-screen border-r border-white/10">
        <h1 onclick="irAlInicio()" class="text-2xl font-black italic text-cyan-glow mb-10 tracking-tighter cursor-pointer hover:opacity-80 transition">
            EL CHIVATAZO</h1>
        <nav class="space-y-6 flex-1 text-lg">
            <div onclick="mostrarSeccion('muro')" class="flex items-center gap-4 cursor-pointer hover:text-cyan-400 transition">
                <i class="fa-solid fa-house"></i> <span>Inicio</span>
            </div>
            <div onclick="mostrarSeccion('deportes')" class="flex items-center gap-4 cursor-pointer hover:text-cyan-400 transition">
                <i class="fa-solid fa-trophy"></i> <span>Deportes</span>
            </div>
            <div onclick="toggleTheme()" class="flex items-center gap-4 cursor-pointer hover:text-cyan-400 transition">
                <i class="fa-solid fa-circle-half-stroke"></i> <span id="themeLabel">Modo Claro</span>
            </div>
            <div class="flex items-center gap-4 cursor-pointer hover:text-cyan-400 transition">
                <i class="fa-solid fa-bell"></i> <span>Notificaciones</span>
            </div>
            <div class="flex items-center gap-4 cursor-pointer hover:text-cyan-400 transition">
                <i class="fa-solid fa-user"></i> <span>Perfil</span>
            </div>
        </nav>
        <button onclick="mostrarSeccion('muro'); document.getElementById('inputTexto').focus()" class="w-full bg-cyan-500 text-slate-900 font-bold py-3 rounded-full hover:bg-cyan-400 transition shadow-lg">POSTEAR</button>
    </aside>

    <main class="flex-1 max-w-2xl border-x border-white/10 min-h-screen">
        
        <div id="seccion-muro">
            <header class="sticky top-0 z-50 glass-header p-4">
                <h2 class="text-xs font-bold uppercase tracking-widest opacity-50 text-center">Muro Principal</h2>
            </header>

            <div class="p-4 border-b border-white/10 bg-white/5">
                <div class="flex gap-4">
                    <div class="w-12 h-12 bg-cyan-600 rounded-full flex-shrink-0 flex items-center justify-center font-bold text-white">YO</div>
                    <div class="flex-1">
                        <textarea id="inputTexto" rows="3" class="w-full bg-transparent border-none text-xl outline-none resize-none placeholder-white/20 text-white" placeholder="¿Cuál es el chivatazo?"></textarea>
                        <div id="imgPreviewContainer"></div>
                        <div class="flex justify-between items-center mt-2 pt-2 border-t border-white/5">
                            <label class="cursor-pointer text-cyan-400 hover:text-cyan-300 text-xl">
                                <i class="fa-solid fa-camera"></i>
                                <input type="file" id="inputFoto" class="hidden" accept="image/*" onchange="previewFile()">
                            </label>
                            <button onclick="guardarPost()" class="bg-cyan-500 text-slate-900 px-8 py-2 rounded-full font-bold hover:bg-cyan-300 transition">Publicar</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="muroDinamico"></div>
        </div>

        <div id="seccion-deportes" class="hidden p-6">
            <h2 class="text-3xl font-bold text-cyan-glow mb-6"><i class="fas fa-chart-line"></i> Dashboard Deportivo</h2>
            
            <div class="flex border-b border-white/10 mb-6 overflow-x-auto">
                <button onclick="changeTab('futbol')" id="btn-futbol" class="tab-btn tab-active flex-1 py-4 font-bold text-center px-4">
                    <i class="fas fa-futbol"></i> Fútbol
                </button>
                <button onclick="changeTab('baloncesto')" id="btn-baloncesto" class="tab-btn flex-1 py-4 font-bold text-center px-4 text-gray-400">
                    <i class="fas fa-basketball-ball"></i> NBA
                </button>
                <button onclick="changeTab('f1')" id="btn-f1" class="tab-btn flex-1 py-4 font-bold text-center px-4 text-gray-400">
                    <i class="fas fa-flag-checkered"></i> F1
                </button>
            </div>

            <div id="futbol" class="tab-content active">
                <div id="datos-futbol" class="grid grid-cols-1 gap-4"></div>
            </div>
            <div id="baloncesto" class="tab-content">
                <div id="datos-baloncesto" class="grid grid-cols-1 gap-4"></div>
            </div>
            <div id="f1" class="tab-content">
                <div id="datos-f1" class="grid grid-cols-1 gap-4"></div>
            </div>
        </div>
    </main>

    <aside class="hidden xl:block w-80 p-4 sticky top-0 h-screen overflow-y-auto">
        <div class="rounded-2xl overflow-hidden border border-white/10 bg-black/20 backdrop-blur-md">

            <div class="p-3 bg-emerald-500/20 text-emerald-400 text-[10px] font-black uppercase tracking-tighter flex items-center gap-2">
                <i class="fa-solid fa-futbol"></i> Fútbol en Vivo
            </div>
            <div id="soccer-live"></div>

            <div class="p-3 bg-orange-500/20 text-orange-500 text-[10px] font-black uppercase tracking-tighter flex items-center gap-2 border-t border-white/5">
                <i class="fa-solid fa-basketball"></i> NBA Live
            </div>
            <div id="nba-live"></div>

            <div class="p-3 bg-red-500/20 text-red-500 text-[10px] font-black uppercase tracking-tighter flex items-center gap-2 border-t border-white/5">
                <i class="fa-solid fa-flag-checkered"></i> F1 Próxima Carrera
            </div>
            <div id="f1-next"></div>

        </div>
    </aside>

    <script>
        const API_KEY = "c2623a555f53586a45aea250dd918679";
        let misPosts = JSON.parse(localStorage.getItem('chivatazos_v3')) || [];
        let imagenBase64 = "";

        // --- LÓGICA DE NAVEGACIÓN ---
        function mostrarSeccion(id) {
            document.getElementById('seccion-muro').classList.toggle('hidden', id !== 'muro');
            document.getElementById('seccion-deportes').classList.toggle('hidden', id !== 'deportes');
            if(id === 'deportes') changeTab('futbol');
        }

        // --- LÓGICA DEPORTIVA (API REAL) ---
        async function updateSports() {
            const h = { "x-rapidapi-key": API_KEY };

            // Fútbol Live
            try {
                h["x-rapidapi-host"] = "v3.football.api-sports.io";
                const r = await fetch("https://v3.football.api-sports.io/fixtures?live=all", { headers: h });
                const d = await r.json();
                document.getElementById('soccer-live').innerHTML = d.response.slice(0, 4).map(m => `
                    <div class="match-card">
                        <div class="flex justify-between text-[9px] opacity-60 mb-1"><span>${m.league.name}</span><span class="text-red-500">${m.fixture.status.elapsed}'</span></div>
                        <div class="flex justify-between text-xs font-bold"><span>${m.teams.home.name}</span><span>${m.goals.home}</span></div>
                        <div class="flex justify-between text-xs font-bold"><span>${m.teams.away.name}</span><span>${m.goals.away}</span></div>
                    </div>
                `).join('') || "<p class='p-4 text-[10px] opacity-40 text-center'>No hay partidos en vivo</p>";
            } catch (e) { console.error(e); }

            // NBA Live
            try {
                h["x-rapidapi-host"] = "v2.nba.api-sports.io";
                const r = await fetch("https://v2.nba.api-sports.io/games?live=all", { headers: h });
                const d = await r.json();
                document.getElementById('nba-live').innerHTML = d.response.map(g => `
                    <div class="match-card">
                        <div class="flex justify-between text-xs"><span>${g.teams.home.name}</span><b>${g.scores.home.points}</b></div>
                        <div class="flex justify-between text-xs"><span>${g.teams.visitors.name}</span><b>${g.scores.visitors.points}</b></div>
                    </div>
                `).join('') || "<p class='p-4 text-[10px] opacity-40 text-center'>NBA fuera de horario</p>";
            } catch (e) { }

            // F1 Next
            try {
                h["x-rapidapi-host"] = "v1.formula-1.api-sports.io";
                const r = await fetch("https://v1.formula-1.api-sports.io/races?next=1&type=race", { headers: h });
                const d = await r.json();
                if (d.response.length > 0) {
                    const rc = d.response[0];
                    document.getElementById('f1-next').innerHTML = `
                        <div class="match-card bg-red-600/5">
                            <div class="text-red-500 font-bold text-[10px] uppercase">${rc.competition.name}</div>
                            <div class="text-xs font-bold mt-1">${rc.circuit.name}</div>
                            <div class="mt-2 text-[10px] p-1 bg-red-600 text-white text-center rounded">${new Date(rc.date).toLocaleDateString()}</div>
                        </div>
                    `;
                }
            } catch (e) { }
        }

        // --- PESTAÑAS SECCIÓN DEPORTES ---
        function changeTab(sportId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => { el.classList.remove('tab-active'); el.classList.add('text-gray-400'); });
            document.getElementById(sportId).classList.add('active');
            document.getElementById('btn-' + sportId).classList.add('tab-active');
            
            // Aquí puedes llamar a funciones específicas para rellenar la pestaña con datos detallados
            if(sportId === 'futbol') cargarDetalleFutbol();
        }

        async function cargarDetalleFutbol() {
            document.getElementById('datos-futbol').innerHTML = `<div class="p-4 bg-white/5 rounded-xl border border-white/10">Cargando clasificación detallada...</div>`;
            // Aquí podrías hacer otro fetch a standings si quisieras
        }

        // --- LÓGICA DEL MURO ---
        function irAlInicio() { mostrarSeccion('muro'); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        function previewFile() {
            const file = document.getElementById('inputFoto').files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                document.getElementById('imgPreviewContainer').innerHTML = `<img src="${reader.result}" class="max-h-40 rounded-xl mt-3 border border-white/20">`;
                imagenBase64 = reader.result;
            }
            if (file) reader.readAsDataURL(file);
        }

        function guardarPost() {
            const txt = document.getElementById('inputTexto');
            if (!txt.value.trim() && !imagenBase64) return;
            misPosts.unshift({ id: Date.now(), autor: 'Periodista Pro', texto: txt.value, foto: imagenBase64, likes: 0, liked: false });
            txt.value = ''; imagenBase64 = '';
            document.getElementById('imgPreviewContainer').innerHTML = '';
            actualizarMuro();
        }

        function actualizarMuro() {
            const cont = document.getElementById('muroDinamico');
            cont.innerHTML = misPosts.map(p => `
                <div class="p-5 border-b border-white/5 hover:bg-white/5 transition">
                    <div class="flex gap-4">
                        <div class="w-10 h-10 bg-slate-700 rounded-full flex items-center justify-center font-bold text-white">${p.autor[0]}</div>
                        <div class="flex-1">
                            <span class="font-bold text-sm text-cyan-400">@${p.autor}</span>
                            <p class="mt-1 opacity-90">${p.texto}</p>
                            ${p.foto ? `<img src="${p.foto}" class="mt-3 rounded-xl max-h-60 w-full object-cover">` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
            localStorage.setItem('chivatazos_v3', JSON.stringify(misPosts));
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeLabel').innerText = document.body.classList.contains('light-mode') ? "Modo Oscuro" : "Modo Claro";
        }

        window.onload = () => { 
            actualizarMuro(); 
            updateSports(); 
            setInterval(updateSports, 60000); // Actualiza cada minuto
        };
    </script>
</body>
</html>
