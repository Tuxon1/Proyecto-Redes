<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Zona Mixta Periodística</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap');

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .text-cyan-glow {
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 212, 255, 0.4);
        }

        .bg-cyan-custom {
            background-color: #00d4ff;
            color: #1a1a2e;
        }

        .bg-cyan-custom:hover {
            background-color: #0099cc;
        }

        [contenteditable]:focus {
            outline: 2px solid #00d4ff;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 0 4px;
        }

        .upload-zone {
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .edit-mode-active .upload-zone {
            cursor: pointer;
        }

        .edit-mode-active .upload-zone:hover::after {
            content: "CAMBIAR IMAGEN 📷";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00d4ff;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .edit-mode-active [contenteditable="true"] {
            background: rgba(0, 212, 255, 0.05);
            border-bottom: 1px dashed #00d4ff;
            padding-bottom: 2px;
            outline: none;
        }

        .avatar-container {
            border: 3px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .warning-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #ffcc00;
            animation: pulse-warning 1.5s infinite;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
        }

        @keyframes pulse-warning {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-return {
            background: transparent;
            border: 1px solid #ffcc00;
            color: #ffcc00;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-return:hover {
            background: #ffcc00;
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8 h-full">

        <aside class="md:w-64 space-y-4">
            <div class="text-3xl font-black italic text-cyan-glow mb-10 tracking-tighter uppercase mt-2">El Chivatazo</div>
            <nav class="space-y-3 font-bold text-sm">
                <div onclick="window.location.href='feed.html'" class="p-3 bg-cyan-custom rounded-lg cursor-pointer flex items-center gap-2 transition hover:scale-105 active:scale-95">
                    📻 Home
                </div>
            </nav>
        </aside>

        <main class="flex-1">
            <div class="glass-card rounded-2xl overflow-hidden relative">

                <div class="absolute top-4 right-4 z-50">
                    <button id="menuToggle" class="text-white hover:text-[#00d4ff] transition p-2 rounded-full hover:bg-black/30 backdrop-blur-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                        </svg>
                    </button>

                    <div id="dropdownMenu" class="hidden absolute right-0 mt-2 w-48 bg-[#1a1a2e] border border-[#00d4ff]/30 rounded-xl shadow-2xl overflow-hidden">
                        <div id="editProfileBtn" class="px-4 py-3 text-[#00d4ff] hover:bg-[#00d4ff]/10 cursor-pointer transition font-bold flex items-center gap-2 border-b border-[#00d4ff]/20">
                            ✏️ Editar Perfil
                        </div>
                        <div id="logoutBtn" class="px-4 py-3 text-red-400 hover:bg-red-500/10 hover:text-red-300 cursor-pointer transition font-bold flex items-center gap-2">
                            Cerrar Sesión
                        </div>
                    </div>
                </div>

                <div id="headerUploadZone" class="upload-zone h-60 bg-slate-800 flex items-center justify-center">
                    <img id="header-img" class="w-full h-full object-cover opacity-70" src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=1470&auto=format&fit=crop">
                    <input type="file" id="input-header" class="hidden" accept="image/*">
                </div>

                <div class="px-8 pb-8 relative">
                    <div class="flex justify-between items-end -mt-16 mb-4">
                        <div id="avatarUploadZone" class="upload-zone w-32 h-32 rounded-full avatar-container">
                            <img id="userPhoto" class="w-full h-full object-cover rounded-full bg-white" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                            <input type="file" id="input-avatar" class="hidden" accept="image/*">
                        </div>
                        
                        <div class="flex gap-2">
                            <button id="saveProfileBtn" class="hidden bg-green-500 px-6 py-2 rounded-lg font-bold transition mb-2 shadow-lg hover:-translate-y-1 text-white">
                                💾 Guardar
                            </button>
                            <button class="bg-cyan-custom px-6 py-2 rounded-lg font-bold transition mb-2 shadow-lg hover:-translate-y-1 text-[#1a1a2e]">
                                Publicar Primicia
                            </button>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <div class="flex items-center gap-3">
                            <h1 id="userName" class="text-3xl font-black tracking-tight">Cargando...</h1>
                            <span class="bg-[#00d4ff]/20 text-[#00d4ff] border border-[#00d4ff]/50 text-xs font-bold px-2 py-0.5 rounded italic uppercase">Prensa Verificada</span>
                        </div>
                        <p id="userEmail" class="text-slate-400 text-sm"></p>
                        <p id="userMedia" class="text-[#00d4ff] font-bold text-lg pt-3 uppercase tracking-wide"></p>
                        <p id="userBio" class="max-w-2xl text-slate-300 leading-relaxed pt-2">Tu biografía profesional o especialidad táctica aparecerá aquí.</p>
                    </div>

                    <div class="flex gap-12 mt-8 border-t border-white/10 pt-6 font-black">
                        <div><p class="text-3xl text-cyan-glow">1.2K</p><p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Lectores</p></div>
                        <div><p class="text-3xl text-cyan-glow">45</p><p class="text-slate-400 text-[10px] uppercase tracking-widest mt-1">Primicias</p></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="saveSuccessModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-[#1a1a2e]/90 backdrop-blur-md">
        <div class="glass-card rounded-2xl p-8 max-w-sm w-full mx-4 text-center border border-green-500/30 shadow-[0_0_40px_rgba(34,197,94,0.15)]">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-500/10 mb-6 border border-green-500/20">
                <svg class="h-8 w-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-2xl font-black text-green-400 mb-2 tracking-wide uppercase">¡Cambios Guardados!</h3>
            <p class="text-slate-300 text-sm mb-8">Tu perfil de prensa ha sido actualizado correctamente.</p>
            <button id="btnFinishSave" class="w-full py-3 rounded-lg font-bold bg-green-500 text-white hover:bg-green-600 shadow-[0_0_20px_rgba(34,197,94,0.4)] transition uppercase tracking-tighter">Entendido</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkA_5UnO7vRe8qSJuqGjkCgYoRc7WjrdI",
            authDomain: "elchivi-9bfcf.firebaseapp.com",
            projectId: "elchivi-9bfcf",
            storageBucket: "elchivi-9bfcf.firebasestorage.app",
            messagingSenderId: "571942007751",
            appId: "1:571942007751:web:e1ffd9e90c9d749c7c5fe2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Referencias DOM
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userMedia = document.getElementById('userMedia');
        const userPhoto = document.getElementById('userPhoto');
        const headerImg = document.getElementById('header-img');
        const userBio = document.getElementById('userBio');
        const saveProfileBtn = document.getElementById('saveProfileBtn');
        const successModal = document.getElementById('saveSuccessModal');

        // Cargar datos
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userEmail.textContent = user.email;
                const docRef = doc(db, "periodistas", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const datos = docSnap.data();
                    userName.textContent = datos.nombreCompleto || "Sin Nombre";
                    userMedia.textContent = datos.medioComunicacion || "Freelance";
                    userBio.textContent = datos.biografia || "Escribe algo sobre ti...";
                    if (datos.fotoPerfil) userPhoto.src = datos.fotoPerfil;
                    if (datos.fotoCabecera) headerImg.src = datos.fotoCabecera;
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // Modo edición
        let isEditMode = false;
        document.getElementById('editProfileBtn').addEventListener('click', () => {
            isEditMode = true;
            document.body.classList.add('edit-mode-active');
            userName.contentEditable = "true";
            userMedia.contentEditable = "true";
            userBio.contentEditable = "true";
            saveProfileBtn.classList.remove('hidden');
            document.getElementById('dropdownMenu').classList.add('hidden');
        });

        // Guardar cambios
        saveProfileBtn.addEventListener('click', async () => {
            const user = auth.currentUser;
            if(!user) return;
            
            saveProfileBtn.textContent = "⌛ Guardando...";
            saveProfileBtn.disabled = true;

            try {
                // (Aquí iría tu lógica de ImgBB para subir imágenes si hay archivos nuevos seleccionados)
                
                const datosAActualizar = {
                    nombreCompleto: userName.textContent.trim(),
                    medioComunicacion: userMedia.textContent.trim(),
                    biografia: userBio.textContent.trim()
                };

                await updateDoc(doc(db, "periodistas", user.uid), datosAActualizar);

                // Desactivar edición
                isEditMode = false;
                document.body.classList.remove('edit-mode-active');
                userName.contentEditable = "false";
                userMedia.contentEditable = "false";
                userBio.contentEditable = "false";
                saveProfileBtn.classList.add('hidden');
                
                // Mostrar Pop-up bonito
                successModal.classList.remove('hidden');
            } catch (e) {
                console.error(e);
                alert("Error al guardar");
            } finally {
                saveProfileBtn.textContent = "💾 Guardar";
                saveProfileBtn.disabled = false;
            }
        });

        // Cerrar modal de éxito
        document.getElementById('btnFinishSave').addEventListener('click', () => {
            successModal.classList.add('hidden');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = "login.html";
        });
    </script>

    <script>
        // Lógica visual del menú
        const menuToggle = document.getElementById('menuToggle');
        const dropdownMenu = document.getElementById('dropdownMenu');
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownMenu.classList.toggle('hidden');
        });
        document.addEventListener('click', () => dropdownMenu.classList.add('hidden'));
    </script>
</body>
</html>
